<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" fill="none">
  <defs>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c6a0"/>
      <stop offset="100%" stop-color="#e8a97e"/>
    </linearGradient>
    <linearGradient id="overallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="toolboxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="wrenchGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="420" r="320" fill="#f97316" opacity="0.06"/>
  <circle cx="400" cy="420" r="240" fill="#f97316" opacity="0.04"/>

  <!-- Floating tools decoration -->
  <!-- Bolt -->
  <g transform="translate(120, 180) rotate(-15)" opacity="0.15">
    <rect x="0" y="0" width="8" height="30" rx="2" fill="#f97316"/>
    <circle cx="4" cy="-6" r="8" fill="none" stroke="#f97316" stroke-width="3"/>
  </g>
  <!-- Screw -->
  <g transform="translate(650, 220) rotate(20)" opacity="0.12">
    <rect x="0" y="0" width="6" height="35" rx="2" fill="#3b82f6"/>
    <line x1="-4" y1="8" x2="10" y2="8" stroke="#3b82f6" stroke-width="2"/>
    <line x1="-4" y1="16" x2="10" y2="16" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <!-- Gear -->
  <g transform="translate(160, 650)" opacity="0.1">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#f59e0b" stroke-width="4"/>
    <circle cx="20" cy="20" r="7" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <line x1="20" y1="0" x2="20" y2="8" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="32" x2="20" y2="40" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="8" y2="20" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="32" y1="20" x2="40" y2="20" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Hammer -->
  <g transform="translate(620, 620) rotate(30)" opacity="0.1">
    <rect x="8" y="0" width="6" height="50" rx="2" fill="#8b5cf6"/>
    <rect x="0" y="-5" width="22" height="14" rx="3" fill="#8b5cf6"/>
  </g>

  <!-- === MAIN FIGURE === -->
  <g filter="url(#shadow)">

    <!-- LEGS (boots + pants) -->
    <!-- Left leg -->
    <path d="M345 680 L340 780 Q338 800 320 800 L310 800 Q300 800 300 790 L300 780 Q300 770 310 770 L325 770 L330 680Z" fill="#1e3a5f"/>
    <!-- Left boot -->
    <path d="M300 780 Q300 800 310 800 L335 800 Q345 800 345 790 L345 775 Q340 770 325 770 L310 770 Q300 770 300 780Z" fill="#4a3728"/>
    <path d="M300 780 L345 780" stroke="#5c4535" stroke-width="2"/>
    <!-- Right leg -->
    <path d="M420 680 L425 780 Q427 800 445 800 L455 800 Q465 800 465 790 L465 780 Q465 770 455 770 L440 770 L435 680Z" fill="#1e3a5f"/>
    <!-- Right boot -->
    <path d="M465 780 Q465 800 455 800 L430 800 Q420 800 420 790 L420 775 Q425 770 440 770 L455 770 Q465 770 465 780Z" fill="#4a3728"/>
    <path d="M420 780 L465 780" stroke="#5c4535" stroke-width="2"/>

    <!-- BODY (overalls / uniform) -->
    <path d="M330 420 Q320 420 310 440 L300 550 Q295 600 310 650 L340 690 L430 690 L460 650 Q475 600 470 550 L460 440 Q450 420 440 420Z" fill="url(#overallGrad)"/>
    <!-- Overall straps -->
    <line x1="350" y1="420" x2="360" y2="480" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <line x1="420" y1="420" x2="410" y2="480" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <!-- Pocket -->
    <rect x="355" y="530" width="60" height="45" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
    <line x1="385" y1="530" x2="385" y2="550" stroke="#1d4ed8" stroke-width="1"/>
    <!-- Belt -->
    <rect x="310" y="580" width="150" height="12" rx="4" fill="#92400e"/>
    <rect x="375" y="577" width="20" height="18" rx="3" fill="#fbbf24"/>
    <!-- Knee patches -->
    <rect x="338" y="700" width="30" height="25" rx="5" fill="#60a5fa" opacity="0.5"/>
    <rect x="400" y="700" width="30" height="25" rx="5" fill="#60a5fa" opacity="0.5"/>

    <!-- T-SHIRT under overalls -->
    <path d="M340 380 Q330 385 320 410 L330 430 Q370 440 400 440 Q430 440 440 430 L450 410 Q440 385 430 380 Q410 370 385 370 Q360 370 340 380Z" fill="#f97316"/>
    <!-- Collar -->
    <path d="M360 378 Q385 390 410 378" stroke="#ea580c" stroke-width="2" fill="none"/>

    <!-- NECK -->
    <rect x="370" y="340" width="30" height="42" rx="10" fill="url(#skinGrad)"/>

    <!-- HEAD -->
    <ellipse cx="385" cy="305" rx="55" ry="60" fill="url(#skinGrad)"/>
    <!-- Face -->
    <!-- Eyes -->
    <ellipse cx="365" cy="300" rx="7" ry="8" fill="white"/>
    <ellipse cx="405" cy="300" rx="7" ry="8" fill="white"/>
    <circle cx="367" cy="301" r="4" fill="#3f3f3f"/>
    <circle cx="407" cy="301" r="4" fill="#3f3f3f"/>
    <circle cx="368" cy="299" r="1.5" fill="white"/>
    <circle cx="408" cy="299" r="1.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M355 288 Q365 282 375 286" stroke="#6b5040" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M395 286 Q405 282 415 288" stroke="#6b5040" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Nose -->
    <path d="M385 305 Q388 318 385 322 Q382 322 380 318" stroke="#d4956a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M368 332 Q385 345 402 332" stroke="#c47a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <ellipse cx="328" cy="305" rx="10" ry="14" fill="#e8a97e"/>
    <ellipse cx="442" cy="305" rx="10" ry="14" fill="#e8a97e"/>
    <!-- Light stubble dots -->
    <circle cx="365" cy="340" r="0.8" fill="#c8956f" opacity="0.4"/>
    <circle cx="375" cy="342" r="0.8" fill="#c8956f" opacity="0.4"/>
    <circle cx="395" cy="342" r="0.8" fill="#c8956f" opacity="0.4"/>
    <circle cx="405" cy="340" r="0.8" fill="#c8956f" opacity="0.4"/>

    <!-- HELMET (construction hard hat) -->
    <path d="M320 280 Q320 235 385 225 Q450 235 450 280 L450 290 Q450 295 445 295 L325 295 Q320 295 320 290Z" fill="url(#helmetGrad)"/>
    <!-- Helmet brim -->
    <path d="M305 290 Q305 282 320 280 L450 280 Q465 282 465 290 Q465 298 450 298 L320 298 Q305 298 305 290Z" fill="#f59e0b"/>
    <!-- Helmet band -->
    <rect x="320" y="278" width="130" height="6" rx="2" fill="#d97706"/>
    <!-- Helmet shine -->
    <path d="M340 250 Q365 240 390 250" stroke="white" stroke-width="3" opacity="0.3" fill="none" stroke-linecap="round"/>
    <!-- Helmet front light/logo -->
    <circle cx="385" cy="268" r="8" fill="#fcd34d" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="385" cy="268" r="4" fill="white" opacity="0.6"/>

    <!-- === LEFT ARM + WRENCH === -->
    <!-- Upper arm -->
    <path d="M320 400 Q300 405 280 430 L260 490" stroke="url(#skinGrad)" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- Forearm going up with wrench -->
    <path d="M260 490 Q240 470 230 440 L220 400" stroke="url(#skinGrad)" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- Sleeve -->
    <path d="M310 395 Q295 400 280 420 L275 430" stroke="#f97316" stroke-width="32" stroke-linecap="round" fill="none"/>

    <!-- Hand gripping wrench -->
    <ellipse cx="220" cy="395" rx="16" ry="18" fill="#e8a97e"/>
    <!-- Fingers -->
    <path d="M210 385 Q205 380 208 375" stroke="#e8a97e" stroke-width="6" stroke-linecap="round"/>
    <path d="M215 382 Q210 375 213 370" stroke="#e8a97e" stroke-width="6" stroke-linecap="round"/>
    <path d="M225 382 Q220 375 223 370" stroke="#e8a97e" stroke-width="6" stroke-linecap="round"/>
    <path d="M232 385 Q228 378 230 373" stroke="#e8a97e" stroke-width="5" stroke-linecap="round"/>

    <!-- BIG WRENCH -->
    <g filter="url(#glow)">
      <!-- Wrench handle -->
      <rect x="213" y="260" width="14" height="120" rx="5" fill="url(#wrenchGrad)"/>
      <!-- Wrench shine on handle -->
      <rect x="216" y="270" width="4" height="100" rx="2" fill="white" opacity="0.15"/>
      <!-- Wrench head (open jaw) -->
      <path d="M195 260 L195 225 Q195 210 210 210 L230 210 Q245 210 245 225 L245 260 L233 260 L233 235 Q233 228 226 228 L214 228 Q207 228 207 235 L207 260Z" fill="#9ca3af"/>
      <!-- Wrench head shine -->
      <path d="M200 220 L210 220" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
    </g>

    <!-- === RIGHT ARM + TOOLBOX === -->
    <!-- Upper arm -->
    <path d="M450 400 Q470 405 490 440 L510 500" stroke="url(#skinGrad)" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- Forearm going down -->
    <path d="M510 500 Q520 530 525 560" stroke="url(#skinGrad)" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- Sleeve -->
    <path d="M460 395 Q475 400 490 425 L495 435" stroke="#f97316" stroke-width="32" stroke-linecap="round" fill="none"/>

    <!-- Hand holding toolbox handle -->
    <ellipse cx="528" cy="565" rx="14" ry="16" fill="#e8a97e"/>

    <!-- TOOLBOX -->
    <g transform="translate(490, 575)">
      <!-- Box body -->
      <rect x="0" y="15" width="85" height="55" rx="6" fill="url(#toolboxGrad)"/>
      <!-- Box lid -->
      <rect x="-3" y="8" width="91" height="12" rx="4" fill="#b91c1c"/>
      <!-- Metal clasp -->
      <rect x="35" y="5" width="15" height="8" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
      <!-- Handle -->
      <path d="M30 8 Q30 -5 42 -5 L43 -5 Q55 -5 55 8" stroke="#4b5563" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Shine -->
      <rect x="8" y="22" width="30" height="3" rx="1.5" fill="white" opacity="0.2"/>
      <!-- Brand label -->
      <rect x="20" y="35" width="45" height="15" rx="3" fill="#991b1b"/>
      <text x="42" y="46" text-anchor="middle" fill="#fca5a5" font-size="8" font-weight="bold" font-family="Arial">TOOLS</text>
      <!-- Tools peeking out -->
      <rect x="10" y="0" width="4" height="15" rx="1" fill="#d1d5db" transform="rotate(-10, 12, 15)"/>
      <rect x="70" y="0" width="4" height="15" rx="1" fill="#fbbf24" transform="rotate(8, 72, 15)"/>
    </g>

  </g>

  <!-- Ground shadow -->
  <ellipse cx="395" cy="810" rx="180" ry="15" fill="#000" opacity="0.08"/>

  <!-- Sparkles / decorative elements -->
  <g opacity="0.25">
    <path d="M180 350 L186 358 L194 350 L186 342Z" fill="#f97316"/>
    <path d="M590 300 L594 306 L600 300 L594 294Z" fill="#3b82f6"/>
    <path d="M140 480 L144 486 L150 480 L144 474Z" fill="#fbbf24"/>
    <path d="M640 480 L644 486 L650 480 L644 474Z" fill="#10b981"/>
    <circle cx="170" cy="250" r="3" fill="#f97316"/>
    <circle cx="620" cy="400" r="3" fill="#3b82f6"/>
    <circle cx="680" cy="350" r="2" fill="#fbbf24"/>
    <circle cx="130" cy="550" r="2" fill="#10b981"/>
  </g>
</svg>