<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none">
  <defs>
    <linearGradient id="skinTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B88A"/>
      <stop offset="100%" stop-color="#D4A373"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3182CE"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="pantsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#1A202C"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="250" cy="582" rx="110" ry="14" fill="#000" opacity="0.12"/>

  <!-- === LEGS === -->
  <!-- Left leg -->
  <path d="M215 432 L208 555 Q207 565 215 568 L230 568 Q238 565 237 555 L238 432 Z" fill="url(#pantsGrad)"/>
  <!-- Right leg -->
  <path d="M262 432 L262 555 Q263 565 270 568 L285 568 Q293 565 292 555 L290 432 Z" fill="url(#pantsGrad)"/>
  <!-- Knee creases -->
  <path d="M218 490 Q228 494 235 490" stroke="#1A202C" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M265 490 Q275 494 288 490" stroke="#1A202C" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- === BOOTS === -->
  <!-- Left boot -->
  <path d="M203 553 Q198 568 200 575 Q203 585 235 585 Q245 585 243 572 L240 553 Z" fill="#5D4037"/>
  <path d="M198 575 Q195 587 205 590 L237 590 Q247 590 245 578 Z" fill="#3E2723"/>
  <path d="M205 570 L240 570" stroke="#4E342E" stroke-width="1" opacity="0.4"/>
  <!-- Right boot -->
  <path d="M258 553 Q254 568 256 575 Q259 585 290 585 Q300 585 298 572 L295 553 Z" fill="#5D4037"/>
  <path d="M253 575 Q250 587 260 590 L292 590 Q302 590 300 578 Z" fill="#3E2723"/>
  <path d="M260 570 L295 570" stroke="#4E342E" stroke-width="1" opacity="0.4"/>

  <!-- === BELT === -->
  <rect x="202" y="422" width="96" height="14" rx="3" fill="#6D4C41"/>
  <!-- Belt buckle -->
  <rect x="240" y="420" width="20" height="18" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <rect x="246" y="425" width="8" height="8" rx="1" fill="none" stroke="#B8860B" stroke-width="1.5"/>

  <!-- === TORSO === -->
  <path d="M198 262 Q188 285 193 422 L307 422 Q312 285 302 262 Q282 252 250 250 Q218 252 198 262 Z" fill="url(#shirtGrad)"/>

  <!-- Collar -->
  <path d="M228 254 L250 278 L272 254" stroke="#1A365D" stroke-width="2" fill="none"/>
  <path d="M228 254 Q230 260 235 265" stroke="#2C5282" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M272 254 Q270 260 265 265" stroke="#2C5282" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Chest pocket -->
  <path d="M275 292 L275 320 L298 320 L298 292 Z" fill="#2C5282" stroke="#1A365D" stroke-width="0.8"/>
  <path d="M275 292 L298 292" stroke="#1A365D" stroke-width="1.2"/>
  <!-- Screwdriver in pocket -->
  <line x1="283" y1="288" x2="281" y2="306" stroke="#F6E05E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="281" y1="306" x2="280" y2="316" stroke="#A0AEC0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Buttons -->
  <circle cx="250" cy="295" r="2.5" fill="#1A365D" opacity="0.5"/>
  <circle cx="250" cy="320" r="2.5" fill="#1A365D" opacity="0.5"/>
  <circle cx="250" cy="345" r="2.5" fill="#1A365D" opacity="0.5"/>
  <circle cx="250" cy="370" r="2.5" fill="#1A365D" opacity="0.5"/>

  <!-- Shirt wrinkles -->
  <path d="M218 300 Q228 315 222 350" stroke="#1A365D" stroke-width="0.7" fill="none" opacity="0.25"/>
  <path d="M282 300 Q272 315 278 350" stroke="#1A365D" stroke-width="0.7" fill="none" opacity="0.25"/>
  <path d="M235 360 Q250 368 265 360" stroke="#1A365D" stroke-width="0.6" fill="none" opacity="0.2"/>

  <!-- Name tag -->
  <g transform="translate(200, 284)">
    <rect x="0" y="0" width="32" height="16" rx="2" fill="white" opacity="0.92" stroke="#CBD5E0" stroke-width="0.5"/>
    <text x="16" y="12" text-anchor="middle" font-size="7" fill="#2B6CB0" font-family="Arial, sans-serif" font-weight="bold">PRO</text>
  </g>

  <!-- === LEFT ARM (holding wrench) === -->
  <!-- Upper arm -->
  <path d="M198 262 Q175 275 165 320 L163 355" stroke="url(#shirtGrad)" stroke-width="30" stroke-linecap="round" fill="none"/>
  <!-- Forearm skin -->
  <path d="M163 350 Q158 378 150 400 L145 418" stroke="url(#skinTone)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Rolled up sleeve -->
  <path d="M158 348 Q168 345 175 350" stroke="#1A365D" stroke-width="2" fill="none"/>
  <path d="M155 352 Q165 349 172 354" stroke="#1A365D" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Left hand gripping wrench -->
  <path d="M138 412 Q132 420 134 432 Q136 440 145 442 Q152 440 155 432 Q158 422 152 414 Z" fill="url(#skinTone)"/>
  <!-- Fingers -->
  <path d="M136 418 Q130 424 132 430" stroke="#C4956A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M138 415 Q133 420 134 426" stroke="#C4956A" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M150 415 Q156 420 154 427" stroke="#C4956A" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Big wrench in left hand -->
  <g transform="translate(118, 380) rotate(-20)">
    <!-- Handle -->
    <rect x="0" y="8" width="55" height="10" rx="3" fill="#718096"/>
    <rect x="0" y="10" width="55" height="6" rx="2" fill="#A0AEC0"/>
    <!-- Jaw open end -->
    <path d="M55 5 L70 0 L75 5 L75 10 L72 13 L55 13 Z" fill="#718096"/>
    <path d="M55 13 L72 13 L75 16 L75 21 L70 26 L55 21 Z" fill="#718096"/>
    <!-- Jaw opening -->
    <rect x="62" y="10" width="10" height="6" fill="#2D3748" opacity="0.3"/>
    <!-- Grip texture -->
    <line x1="10" y1="9" x2="10" y2="17" stroke="#4A5568" stroke-width="0.8" opacity="0.4"/>
    <line x1="15" y1="9" x2="15" y2="17" stroke="#4A5568" stroke-width="0.8" opacity="0.4"/>
    <line x1="20" y1="9" x2="20" y2="17" stroke="#4A5568" stroke-width="0.8" opacity="0.4"/>
    <line x1="25" y1="9" x2="25" y2="17" stroke="#4A5568" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="9" x2="30" y2="17" stroke="#4A5568" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- === RIGHT ARM (confident pose on hip) === -->
  <!-- Upper arm -->
  <path d="M302 262 Q325 275 335 315 L338 360" stroke="url(#shirtGrad)" stroke-width="30" stroke-linecap="round" fill="none"/>
  <!-- Forearm skin -->
  <path d="M338 355 Q342 385 338 410 L332 418" stroke="url(#skinTone)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Rolled up sleeve -->
  <path d="M332 352 Q342 349 348 354" stroke="#1A365D" stroke-width="2" fill="none"/>

  <!-- Right hand on hip -->
  <path d="M322 412 Q315 422 318 432 Q322 438 332 438 Q342 435 345 425 Q346 415 340 410 Z" fill="url(#skinTone)"/>
  <!-- Thumb -->
  <path d="M338 412 Q346 408 348 415 Q347 422 342 423" stroke="#C4956A" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- === NECK === -->
  <rect x="238" y="232" width="24" height="24" rx="6" fill="url(#skinTone)"/>
  <!-- Adam's apple subtle -->
  <ellipse cx="250" cy="244" rx="3" ry="4" fill="#C4956A" opacity="0.2"/>

  <!-- === HEAD === -->
  <ellipse cx="250" cy="195" rx="48" ry="53" fill="url(#skinTone)"/>

  <!-- Hair - neat short dark hair -->
  <path d="M202 188 Q198 155 215 138 Q235 122 255 120 Q275 120 292 135 Q308 152 302 188 Q298 172 282 160 Q265 150 248 152 Q228 155 215 168 Z" fill="#3D2E1F"/>
  <!-- Hair texture lines -->
  <path d="M218 152 Q230 142 248 138" stroke="#2D1F12" stroke-width="0.8" opacity="0.3" fill="none"/>
  <path d="M258 138 Q278 144 290 158" stroke="#2D1F12" stroke-width="0.8" opacity="0.3" fill="none"/>
  <!-- Side hair -->
  <path d="M202 188 Q200 195 203 200" stroke="#3D2E1F" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M298 188 Q300 195 297 200" stroke="#3D2E1F" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Ears -->
  <ellipse cx="202" cy="200" rx="9" ry="13" fill="#D4A373"/>
  <ellipse cx="298" cy="200" rx="9" ry="13" fill="#D4A373"/>
  <ellipse cx="203" cy="200" rx="5" ry="8" fill="#E8B88A" opacity="0.5"/>
  <ellipse cx="297" cy="200" rx="5" ry="8" fill="#E8B88A" opacity="0.5"/>

  <!-- Eyebrows - confident -->
  <path d="M220 178 Q230 172 243 176" stroke="#3D2E1F" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M257 176 Q270 172 280 178" stroke="#3D2E1F" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="232" cy="193" rx="9" ry="9.5" fill="white"/>
  <ellipse cx="268" cy="193" rx="9" ry="9.5" fill="white"/>
  <!-- Irises - warm brown -->
  <ellipse cx="234" cy="194" rx="5.5" ry="6" fill="#6B4226"/>
  <ellipse cx="270" cy="194" rx="5.5" ry="6" fill="#6B4226"/>
  <!-- Pupils -->
  <circle cx="235" cy="194" r="2.8" fill="#1A0E05"/>
  <circle cx="271" cy="194" r="2.8" fill="#1A0E05"/>
  <!-- Eye shine -->
  <circle cx="237" cy="192" r="1.8" fill="white" opacity="0.85"/>
  <circle cx="273" cy="192" r="1.8" fill="white" opacity="0.85"/>
  <!-- Lower eye shine -->
  <circle cx="233" cy="196" r="1" fill="white" opacity="0.3"/>
  <circle cx="269" cy="196" r="1" fill="white" opacity="0.3"/>
  <!-- Eyelids -->
  <path d="M223 189 Q232 185 241 189" stroke="#C4956A" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M259 189 Q268 185 277 189" stroke="#C4956A" stroke-width="1.2" fill="none" opacity="0.4"/>
  <!-- Lower lash line -->
  <path d="M224 198 Q232 201 240 198" stroke="#C4956A" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M260 198 Q268 201 276 198" stroke="#C4956A" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- Nose -->
  <path d="M248 198 Q244 210 240 216 Q244 220 250 220 Q256 220 260 216 Q256 210 252 198" stroke="#C4956A" stroke-width="1.5" fill="none"/>
  <!-- Nostril hints -->
  <ellipse cx="243" cy="217" rx="3" ry="2" fill="#C4956A" opacity="0.2"/>
  <ellipse cx="257" cy="217" rx="3" ry="2" fill="#C4956A" opacity="0.2"/>

  <!-- Confident smile -->
  <path d="M230 228 Q240 242 250 244 Q260 242 270 228" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Upper lip -->
  <path d="M236 230 Q243 226 250 228 Q257 226 264 230" stroke="#C08060" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Smile showing teeth hint -->
  <path d="M236 232 Q250 240 264 232" fill="white" opacity="0.3"/>
  <!-- Laugh lines -->
  <path d="M226 222 Q228 228 230 228" stroke="#C4956A" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M274 222 Q272 228 270 228" stroke="#C4956A" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Light stubble -->
  <g fill="#8B7355" opacity="0.15">
    <circle cx="232" cy="234" r="0.6"/><circle cx="237" cy="237" r="0.6"/>
    <circle cx="242" cy="239" r="0.6"/><circle cx="247" cy="240" r="0.6"/>
    <circle cx="253" cy="240" r="0.6"/><circle cx="258" cy="239" r="0.6"/>
    <circle cx="263" cy="237" r="0.6"/><circle cx="268" cy="234" r="0.6"/>
    <circle cx="235" cy="240" r="0.5"/><circle cx="250" cy="243" r="0.5"/>
    <circle cx="265" cy="240" r="0.5"/>
  </g>

  <!-- === TOOL BELT ACCESSORIES === -->
  <!-- Left tool pouch -->
  <path d="M198 436 Q185 440 182 450 L182 475 Q182 482 190 482 L200 482 Q205 482 205 475 L205 440 Z" fill="#6D4C41" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Hammer handle sticking out -->
  <g transform="translate(186, 445) rotate(8)">
    <rect x="0" y="-5" width="6" height="35" rx="2" fill="#A1887F"/>
    <rect x="-4" y="-10" width="14" height="10" rx="2" fill="#78909C"/>
    <!-- Hammer claw -->
    <path d="M10 -10 Q14 -15 12 -18 L10 -16 Q12 -12 10 -10" fill="#78909C"/>
  </g>

  <!-- Right tool pouch -->
  <path d="M295 436 Q310 440 315 450 L315 475 Q315 482 308 482 L298 482 Q293 482 293 475 L293 440 Z" fill="#6D4C41" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Measuring tape -->
  <g transform="translate(305, 455)">
    <circle cx="0" cy="0" r="11" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
    <circle cx="0" cy="0" r="7.5" fill="#FFEE58"/>
    <circle cx="0" cy="0" r="3" fill="#F9A825"/>
    <!-- Lock button -->
    <rect x="5" y="-3" width="7" height="6" rx="1.5" fill="#E65100" opacity="0.7"/>
    <!-- Tape end -->
    <path d="M11 -1 Q16 -3 18 1 L19 2 Q17 4 14 2 L11 1 Z" fill="#FDD835"/>
  </g>

  <!-- Pliers in center belt -->
  <g transform="translate(248, 436) rotate(-3)">
    <path d="M-2 0 L-3 20 Q-3 22 -1 22 L1 22 Q3 22 3 20 L2 0 Z" fill="#E65100"/>
    <path d="M2 0 L3 20 Q3 22 5 22 L7 22 Q9 22 9 20 L8 0 Z" fill="#E65100"/>
    <!-- Joint -->
    <circle cx="3" cy="0" r="3.5" fill="#78909C"/>
    <!-- Jaws -->
    <path d="M-2 0 L-4 -10 Q-3 -14 0 -14 L3 0 Z" fill="#90A4AE"/>
    <path d="M3 0 L6 -10 Q7 -14 4 -14 L1 0 Z" fill="#90A4AE"/>
  </g>

  <!-- === FOREARM DETAIL (veins/muscle tone) === -->
  <path d="M158 365 Q155 375 152 395" stroke="#C4956A" stroke-width="0.6" fill="none" opacity="0.2"/>
  <path d="M162 360 Q160 375 157 390" stroke="#C4956A" stroke-width="0.6" fill="none" opacity="0.15"/>
</svg>