# ============================================
# MasterUz — Nginx Config для Railway (Frontend)
# Без proxy на backend: VITE_API_URL указывает напрямую на публичный URL backend.
# Слушаем $PORT — Railway назначает порт динамически.
# ============================================

server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html НИКОГДА не кешируем — иначе Telegram WebView держит старый бандл
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Long cache для статики (хешированные имена файлов — безопасно)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Заголовки безопасности (разрешаем Telegram Mini App в iframe)
    add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
