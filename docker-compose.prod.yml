# ============================================
# MasterUz — Production Docker Compose
# Полный стек: Nginx (SSL) → Frontend → Backend → PostgreSQL + Redis
# ============================================

version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: masteruz-postgres
    restart: always
    environment:
      POSTGRES_DB: masteruz
      POSTGRES_USER: masteruz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masteruz -d masteruz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis Cache ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: masteruz-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Express + Prisma) ───────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masteruz-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://masteruz:${DB_PASSWORD}@postgres:5432/masteruz
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: "30d"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_MINI_APP_URL: https://${DOMAIN}
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID}
      PAYME_MERCHANT_KEY: ${PAYME_MERCHANT_KEY}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 5242880
      CORS_ORIGIN: https://${DOMAIN}
      SUPER_ADMIN_USERNAMES: ${SUPER_ADMIN_USERNAMES}
      LOG_LEVEL: warn
    volumes:
      - uploads_data:/app/uploads
      - registry_data:/app/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Frontend (Nginx + SPA) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_USERNAME}
        VITE_YANDEX_MAPS_KEY: ${YANDEX_MAPS_API_KEY}
    container_name: masteruz-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - internal

  # ─── Nginx Reverse Proxy (SSL) ────────────
  nginx:
    image: nginx:alpine
    container_name: masteruz-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

  # ─── Certbot (SSL auto-renewal) ──────────
  certbot:
    image: certbot/certbot
    container_name: masteruz-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  registry_data:
    driver: local

networks:
  internal:
    driver: bridge
