name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch: # ручной запуск из GitHub UI

jobs:
  build-apk:
    name: Сборка Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Исходники ───────────────────────────────────────────────
      - name: Checkout репозитория
        uses: actions/checkout@v4

      # ── 2. Java ────────────────────────────────────────────────────
      - name: Установить Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Node.js ─────────────────────────────────────────────────
      - name: Установить Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 4. Зависимости frontend ────────────────────────────────────
      - name: Установить npm зависимости
        working-directory: frontend
        run: npm install --no-audit --no-fund

      # ── 5. Создать .env для Android сборки ─────────────────────────
      - name: Создать .env.android
        working-directory: frontend
        run: |
          cat > .env.android << 'EOF'
          VITE_API_URL=${{ secrets.VITE_API_URL || 'https://masteruz-ecru.vercel.app/api' }}
          VITE_TELEGRAM_BOT_NAME=Handymanuzbot
          NODE_ENV=production
          EOF

      # ── 6. Собрать React ───────────────────────────────────────────
      - name: Собрать frontend (mode=android)
        working-directory: frontend
        run: npm run build:android

      # ── 7. Синхронизировать Capacitor ──────────────────────────────
      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      # ── 8. Gradle permissions ──────────────────────────────────────
      - name: Дать права Gradle
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 9. Сборка APK (debug — не требует keystore) ───────────────
      - name: Собрать debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 10. Переименовать APK ──────────────────────────────────────
      - name: Переименовать APK
        run: |
          mkdir -p artifacts
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/MasterUz-android.apk
          ls -lh artifacts/

      # ── 11. Загрузить APK как артефакт ─────────────────────────────
      - name: Upload APK артефакт
        uses: actions/upload-artifact@v4
        with:
          name: MasterUz-APK
          path: artifacts/MasterUz-android.apk
          retention-days: 30

      # ── 12. Создать GitHub Release (только при push в main) ────────
      - name: Создать Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: "MasterUz Android v${{ github.run_number }}"
          body: |
            ## Скачать приложение MasterUz для Android

            📥 **[Скачать APK](https://github.com/${{ github.repository }}/releases/download/android-v${{ github.run_number }}/MasterUz-android.apk)**

            ### Как установить:
            1. Скачайте файл `MasterUz-android.apk`
            2. На телефоне откройте файл
            3. Разрешите установку из неизвестных источников
            4. Нажмите «Установить»

            ---
            Сборка #${{ github.run_number }} от ${{ github.sha }}
          files: artifacts/MasterUz-android.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
