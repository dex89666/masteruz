name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

permissions:
  contents: write # для создания GitHub Release

jobs:
  build-apk:
    name: Сборка Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Установить Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Установить npm зависимости
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Создать .env.android
        working-directory: frontend
        run: |
          cat > .env.android << 'EOF'
          VITE_API_URL=${{ secrets.VITE_API_URL || 'https://masteruz-backend-production.up.railway.app/api' }}
          VITE_TELEGRAM_BOT_NAME=Handymanuzbot
          NODE_ENV=production
          EOF

      # versionName = "x.y.z" из package.json + ".N" где N = github.run_number
      # versionCode = github.run_number (монотонно растёт, никогда не повторяется)
      - name: Определить версию
        id: ver
        working-directory: frontend
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          VERSION_NAME="${PKG_VERSION}.${{ github.run_number }}"
          VERSION_CODE="${{ github.run_number }}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Сборка $VERSION_NAME (code $VERSION_CODE)"

      - name: Собрать frontend (mode=android)
        working-directory: frontend
        run: npm run build:android

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Дать права Gradle
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Расшифровать keystore
        id: keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: frontend/android/app
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > masteruz-release.jks
          echo "has_keystore=true" >> "$GITHUB_OUTPUT"

      - name: Собрать release APK (подписанный)
        if: steps.keystore.outputs.has_keystore == 'true'
        working-directory: frontend/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionCode=${{ steps.ver.outputs.version_code }} \
            -PversionName=${{ steps.ver.outputs.version_name }} \
            -Pandroid.injected.signing.store.file=$(pwd)/app/masteruz-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Собрать debug APK (fallback без подписи)
        if: steps.keystore.outputs.has_keystore != 'true'
        working-directory: frontend/android
        run: |
          ./gradlew assembleDebug --no-daemon \
            -PversionCode=${{ steps.ver.outputs.version_code }} \
            -PversionName=${{ steps.ver.outputs.version_name }}

      - name: Подготовить артефакт
        run: |
          mkdir -p artifacts
          if [ -f frontend/android/app/build/outputs/apk/release/app-release.apk ]; then
            cp frontend/android/app/build/outputs/apk/release/app-release.apk artifacts/MasterUz-android.apk
          else
            cp frontend/android/app/build/outputs/apk/debug/app-debug.apk artifacts/MasterUz-android.apk
          fi
          ls -lh artifacts/

      - name: Upload APK артефакт
        uses: actions/upload-artifact@v4
        with:
          name: MasterUz-APK
          path: artifacts/MasterUz-android.apk
          retention-days: 30

      - name: Создать Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.ver.outputs.version_code }}
          name: "MasterUz Android ${{ steps.ver.outputs.version_name }}"
          body: |
            ## 📱 MasterUz для Android — версия ${{ steps.ver.outputs.version_name }}

            📥 **[Скачать APK](https://github.com/${{ github.repository }}/releases/download/android-v${{ steps.ver.outputs.version_code }}/MasterUz-android.apk)**

            ### Как установить
            1. Скачайте APK на устройство Android
            2. Откройте файл — система предложит разрешить установку из неизвестных источников
            3. Подтвердите установку

            ### Что нового
            Коммит `${{ github.sha }}` · ветка `${{ github.ref_name }}`

            ---
            Версия `${{ steps.ver.outputs.version_name }}` · build `${{ steps.ver.outputs.version_code }}`
          files: artifacts/MasterUz-android.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Сбросить версионный кэш на бэкенде
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.BACKEND_REFRESH_TOKEN != ''
        env:
          BACKEND_REFRESH_TOKEN: ${{ secrets.BACKEND_REFRESH_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://masteruz-backend-production.up.railway.app' }}
        run: |
          curl -fsSL -X POST "$BACKEND_URL/api/app/version/refresh" \
            -H "Authorization: Bearer $BACKEND_REFRESH_TOKEN" \
            || echo "Backend refresh не выполнен (не критично)"
