# ============================================
# MasterUz — CI/CD Pipeline (GitHub Actions)
# ============================================

name: MasterUz CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/masteruz

jobs:
  # ─── 1. Тесты ────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: masteruz_test
          POSTGRES_USER: masteruz
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://masteruz:test_password@localhost:5432/masteruz_test

      - name: Seed database
        working-directory: backend
        run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: postgresql://masteruz:test_password@localhost:5432/masteruz_test

      - name: Run tests
        working-directory: backend
        run: npx vitest run
        env:
          NODE_ENV: test
          PORT: 3001
          DATABASE_URL: postgresql://masteruz:test_password@localhost:5432/masteruz_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

      - name: TypeScript check (backend)
        working-directory: backend
        run: npx tsc --noEmit

      - name: TypeScript check (frontend)
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit

  # ─── 2. Build & Push Docker Images ───────
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_TELEGRAM_BOT_NAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
            VITE_YANDEX_MAPS_KEY=${{ secrets.YANDEX_MAPS_API_KEY }}

  # ─── 3. Deploy to Server ──────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/masteruz
            git pull origin main
            
            # Pull latest images
            docker compose -f docker-compose.prod.yml pull backend frontend
            
            # Restart with zero downtime
            docker compose -f docker-compose.prod.yml up -d --no-deps --build backend frontend
            
            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
            
            # Cleanup
            docker image prune -f
            
            echo "✅ Deploy completed at $(date)"
