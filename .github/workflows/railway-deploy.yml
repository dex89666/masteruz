name: Deploy to Railway

# Автодеплой обоих сервисов на Railway после push в main.
# Этот workflow заменяет нативный Railway → GitHub auto-deploy
# (полезно когда сломан OAuth между Railway и GitHub App).
#
# Требуется секрет в репозитории: RAILWAY_TOKEN
# Создать: https://railway.com/account/tokens → Project Token для проекта masteruz
# Добавить: https://github.com/dex89666/masteruz/settings/secrets/actions

on:
  push:
    branches: [main]
  workflow_dispatch: # ручной запуск из вкладки Actions

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: false # не отменять предыдущий — лучше дождаться

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Нужно ⁥2 коммитов, иначе git diff HEAD~1 не работает
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD | grep -qE '^(backend/|shared/)'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.changes.outputs.deploy == 'true'
        run: npm i -g @railway/cli

      - name: Deploy backend
        if: steps.changes.outputs.deploy == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service masteruz-backend --ci --detach

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD | grep -qE '^(frontend/|shared/)'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.changes.outputs.deploy == 'true'
        run: npm i -g @railway/cli

      - name: Deploy frontend
        if: steps.changes.outputs.deploy == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service masteruz-frontend --ci --detach
