# ============================================
# Временный конфиг для получения SSL сертификата
# Используется ТОЛЬКО при первом запуске (шаг 5.2)
# После получения SSL — замените на masteruz.conf
# ============================================

server {
    listen 80;
    server_name masteruz.uz www.masteruz.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'MasterUz is setting up SSL...';
        add_header Content-Type text/plain;
    }
}
